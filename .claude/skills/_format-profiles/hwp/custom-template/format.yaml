# format.yaml — HWP 양식 프로파일 템플릿 (복사해서 새 HWP 양식 추가)
# 새 양식 = 이 디렉터리를 _format-profiles/hwp/<new-name>/ 로 복사 후 값 채우기.
# skill 코드 무수정(AC4). 로딩 규약: profile-resolution-rules.md.

name: custom-template            # 양식 식별자. 실제 양식명으로 교체.
family: hwp
engine: hancom-com               # 양식 적용(쓰기) 엔진. 아래 engine_routing 참조.
engine_routing:                  # (2026-07-07) 작업방향별 엔진 분기
  read: kordoc                   #   읽기/추출 = kordoc(MCP, WSL 네이티브·표100%·수식LaTeX). 정본 _writing-core/document-extraction.md
  generate: kordoc-conditional   #   Markdown→HWPX 생성 = kordoc. ⚠️ 수식은 LaTeX 텍스트로 남고 미조판(수식 문서는 한컴 후처리) + 양식 충실도 미검증 → 생성 후 한컴 render 검증 필수 + 실패 시 pyhwpx fallback
  style_apply: hancom-com        #   복잡 표양식·글꼴·수식·HWP5 구조편집 = 한컴 COM(pyhwpx) 유지(kordoc 미지원 영역)
reference_template: ""           # 레퍼런스 .hwp 경로(있으면). 없으면 빈 문자열.
notes: |
  HWP 양식 규칙: 원본 직접수정 금지 → 복사본 작업, 사용자 승인 후 적용(AC8).
  읽기/추출은 kordoc(engine_routing.read). 표 양식(쓰기)은 hwp-table-style 스킬 위임(렌더 이미지로 검증).
  HWPX 생성(kordoc)은 한컴 render로 양식 충실도 검증 후에만 "완성" 보고(미검증 대체 금지).
  글꼴/색/셀배경 경계는 hwp-docx-format-rules.md 참조.
