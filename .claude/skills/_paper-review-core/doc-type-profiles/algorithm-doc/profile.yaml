# 근거: SAR-L2A-DOC-004 ATBD(초안) + **교차 EO 하위도메인 검증 8건 실측(2026-07-14)** —
#   ASF RTC ATBD + NASA MODIS 에어로졸/LAI · ESA CCI SST/고도계(SLCCI) · GPM IMERG · 국내 GK2A 산불·GOCI-II 해양색.
#   → SAR/GAMMA 과적합 제거. ⚠️ 표본 8건 전부 위성 EO(원격탐사)이므로 검증범위 = **"교차 EO 하위도메인"**이지
#   비-EO(수치해석·ML·신호처리 일반) 알고리즘까지의 완전 도메인중립은 미검증(codex V2 지적, 비-EO 표본 도착 시 보정).
