version: 3   # v3: 교차 EO 검증(v2) + codex V2 적대검토 반영(2026-07-14) — 판정상태분리·수치건전성·범위정합·불확실성·변경추적·trigger overlay
name: algorithm-doc

# ── 5필드 특성 ────────────────────────────────────────────
purpose: >
  게재·선정이 아니라 **재현·감사·이관**: 제3자(검증팀·후임 개발자·인수기관)가 이 문서만으로 알고리즘의
  물리·수학적 근거를 이해하고, 구현/사양이 그 근거를 충실히 따르는지 검증하며, 필요 시 동일 결과를 재현할 수 있게 하는 것.
  문서 전체가 "이 처리 단계가 왜/어떻게 옳은가"의 논증이며, 학술 신규성이 아니라 **이론↔구현(사양) 추적성**과
  **가정·한계의 정직한 명시 + 정량 검증**을 판다(검증 8건 공통: 이론→수학→정량검증→가정·한계 구성).

audience: >
  알고리즘의 정당성·재현성을 검증하려는 기술 독자 — 검증/QA 엔지니어, 후임 개발자, 인수기관 심사자,
  하류 제품 사용자(오차·한계를 알아야 하는). 도메인 배경은 있으나 이 구현의 내부 결정을 모르는 독자.

evaluation_axes:
  - "이론↔구현(사양) 정합성(핵심): 서술된 물리·수학 근거가 실제 구현(코드·명령·파라미터) 또는 알고리즘 사양(의사코드·수식 정의)과 일치하는가. ⚠️ **판정상태를 분리**: (a) 사양 내적정합(수식↔서술↔사양)=제출본 단독 평가 가능 / (b) 실제 구현 정합(코드 대조)=구현 제공 시만. 보증수준을 '사양 수준만 확인'과 '구현까지 확인'으로 구분 기재. 또 '코드 비공개'(not_assessed) vs '구현 전 순수이론'(not_applicable) 구분. 문서-구현 drift가 최대 위험."
  - "수치 건전성·구현위험(실행형): 알고리즘의 수치 안정성·conditioning·수렴성·정밀도·overflow/underflow·결측·경계값 처리·(stochastic이면) seed/비결정성이 다뤄지는가. ⚠️ 코드/실행 구현이 있는 문서에만 적용(순수이론·사양형이면 not_applicable), 도메인 무관."
  - "근거 추적성: 각 처리 결정이 참고문헌·표준·heritage(계승 알고리즘/센서)·선행결과 중 검증가능한 근거로 서 있는가. 인용이 실재하고 주장을 실제로 뒷받침하는가. '~로 알려져 있다'류 무출처 단정 검출. (전 검증문서 References + heritage 절 보유 — 범용)"
  - "가정·적용범위·한계 명시: 알고리즘이 성립하는 전제(입력 규격·기하·해상도 등)와 실패 조건·fallback·알려진 오차원인이 정직하게 기술되는가. 별도 절이 아니어도 무방(문서 관행 따름). 한계 은폐·과일반화 검출."
  - "검증 근거·범위정합(핵심 게이트): 주장이 검증으로 뒷받침되는가 — **주장유형별 요건**: 정량 주장=독립 참조자료 대비 정량 비교+수용기준, 정성/이론 주장=논증·유도. 단일 수치를 pass/fail로 오용 금지. ★ '검증 존재'만 보지 말고 **검증 범위(지역·기간·클래스·입력영역)가 주장된 적용범위를 실제로 덮는가**를 평가('좋은 표가 있는 나쁜 ATBD' 차단). + **불확실성 전파**: 입력 불확실성이 중간→산출로 어떻게 전파되며 검증자료 자체 불확실성을 어떻게 처리하는가(과학 알고리즘 변별축, ESA CCI SST 등에 실재)."
  - "재현성·provenance·변경추적: 동일 결과 재현에 필요한 요소가 명시되는가 — **최소 = SW/알고리즘 버전·개정이력 + 입력 데이터셋 식별**. code/data hash 결정론 고정은 **trigger 기반 조건부**: 결정론 재처리·규제/인증 문서·bit-exact 주장 문서면 필수, 그 외 가점. + **변경 영향 추적**: 개정이력 보유만으론 부족 — 알고리즘 변경→영향 수식/파라미터→재검증 항목 연결이 실행형 문서에 있는가. 재현판정 기준(bit-exact vs tolerance) 타당성."
  - "완결성·정보 추적성: 처리 체계의 각 단계가 누락 없이 이어지고(입력→중간→산출), 필요 정보(약어·정량표·개정이력 등)가 **가용·추적 가능**한가. ⚠️ 평가 대상은 '위치'가 아니라 '정보 가용성' — 다문서 패키지면 다른 정본 문서가 담당할 수 있음(그 경우 참조가 명시되면 충족). '문서세트 정본 정합'은 **다문서 패키지 일부일 때만** 평가(단독 문서면 not_applicable — 정본 우선순위표는 ATBD 일반 요건 아님, 배포패키지 특유)."
  - "표기·단위·기호 일관성: 수식 기호·단위·좌표계·데이터타입·경계조건·용어·약어가 일관 정의·사용되는가. 약어표가 이 문서에 없어도 세트 내 정본 참조가 명시되면 충족(정보 가용성). 동일 개념의 상이 명명 검출."

structure_conventions: >
  범용 관행(검증 8건 공통 골격): 문서정보(적용문서·개정이력·표기/기호/약어표) → 목적·범위 →
  알고리즘 개요·처리흐름(입출력) → 이론적 배경·수학적 정식화(가정 명시) → 구현 사양(코드·도구·명령 — 있으면
  구체 도구명 그대로, 없으면 알고리즘 사양 정밀도로 대체) → 품질지표·오차원인·한계 →
  검증(주장유형별: 정량주장=독립 참조자료 대비 정량표+수용기준, 정성/이론주장=논증 — 검증범위가 주장범위를 덮는지) → 재현성(SW/데이터 버전·개정이력·변경추적) → 참고문헌.
  특정 구조를 강제하지 않되 '주장이 근거·구현(사양)·정량검증으로 삼단 연결'되는지를 본다.
  이론과 검증을 별도 장으로 분리하든(MODIS·GK2A) 단계별로 통합하든(SLCCI·SAR) 무방(도메인 편성 차이).

success_criteria: >
  검증팀이 각 처리 단계의 물리적 정당성을 확인하고, 서술된 수식·파라미터가 실제 구현/사양과 일치함을 대조할 수 있고,
  정량 주장이 독립 참조자료 대비 검증으로 뒷받침되며, 가정·한계·오차원인이 정직하게 명시되고, 재현에 필요한
  버전·데이터 식별이 고정되면 성공. 최종 성공 = 제3자 독립 재현·감사 가능성.

language: follow_document

# ── 비적용(범주 오류 경고) ─────────────────────────────────
non_axes: >
  학술적 신규성·기여도(알고리즘 문서는 기성/개량 방법의 정확한 적용·구현을 기술) · 저널 투고 적합성·블라인드·
  peer-review 어휘(accept/reject/minor revision) · 문단형 산문 완성도(수식+명령/사양 표가 표준) ·
  가설-검정 통계 유의성(해당 알고리즘이 통계추론일 때만) · 인용 형식 완전성(서지 스타일보다 인용 실재·타당성).
  ⚠️ **특정 SW 벤더/브랜드(GAMMA·ISCE·SNAP 등) 의존을 요구하지 말 것** — 처리도구명은 문서가 실제 사용한 것을
  그대로 인정, 도구명 부재(순수 이론형)라고 감점하지 않는다. code/data hash 고정 부재도 감점 아님(가점 요소).
  ⚠️ 단 문서가 인용한 이론·선행결과의 정합·출처 실재·수치 타당성 검증은 정당(근거 추적성 축). 논문 rubric 8차원 이식 금지.

# ── axis_state / required_inputs (T1 규약) ─────────────────
# required_inputs: [대상 구현/사양(코드·명령·의사코드), (있으면) 준거 표준/템플릿, (있으면) 검증 데이터·리포트]
# 구현 소스(코드/--help) 부재 시 — 축1의 코드 대조 부분만 not_assessed(수식↔서술↔사양 내적정합은 제출본 단독 평가).
#   순수 이론형 ATBD(코드 원래 없음)는 not_assessed 아니라 사양-정합으로 실판정.
# 검증 데이터·외부 벤치마크 부재 시: 축4의 외부 재현 확인만 not_assessed, 검증 절차·수용기준의 논리 타당성은 실판정.
# 단독 문서(다문서 패키지 아님): 축6의 '문서세트 정본 정합'은 not_applicable(적용문서 나열 일관성만 평가).

# ── SAR/결정론 재처리 overlay (도메인 확장 — 필수 아님) ──────
# SAR·InSAR·결정론 파이프라인 문서일 때 trigger 기반 조건부 적용(해당 trigger면 필수, 아니면 N/A):
#   · 다중 처리체인 정본 우선순위표(배포패키지) · GAMMA/ISCE 등 구체 명령 syntax 정합 ·
#   · code/data hash + SW build 고정 재현성 · 다단계 처리 검증계보(lineage) · complex 위상 convention·kernel 정합.
# 이는 SAR-L2A류에서 '가점/심화'이며, 타 도메인 ATBD에 요구하면 과적합(검증 8건에서 SAR 특유로 확인).

