# profile.yaml — 문서유형 특성 프로필: 제안서·연구개발계획서(proposal)
# 계약: T2 (선행 doctype 일반화 + T1). 근거: 실문서 5건 특성분석 실측(reference/proposal/, 2026-07-10 —
#   지자체 SI용역 117p·예비계획서 21p·총괄과제 139p·정책연구용역 응찰 52p·기술사업화 109p).
# ★ 심장: 이 프로필이 rubric·페르소나의 파생원. 논문 기준을 이식하지 않는다.
# rubric = 공통 코어 + 아래 evaluation_axes 오버레이 + T1 증거규칙/axis_state.
# ⚠️ 외부 평가기준 우선: 공고문·RFP·배점표가 제공되면 그것이 본 프로필 기본축보다 우선(4층 병합 1순위).

schema: doc_type_profile
version: 1
name: proposal

# ── 5필드 특성 ────────────────────────────────────────────
purpose: >
  게재가 아니라 선정·수주: 평가위원회 심사 또는 제안평가를 통과해 협약(R&D)/계약(용역)에 도달.
  문서 전체가 "이 팀이 이 과업을 해낼 이유"의 논증이며, 학술 신규성 자체보다
  공고 요구사항과의 정합 + 수행 확실성을 판다(실측: 장 제목=평가항목 사상, RFP 준수 명시).
audience: >
  배점표를 들고 다건을 짧은 시간에 읽는 평가위원(학계+산업계 혼성) + 규정 적합성을 보는 행정 검토자.
  문서가 '채점 동선'을 구조로 제공해야 하는 독자(항목별 대응 섹션·표를 즉시 찾게).
evaluation_axes:
  - "공고·RFP·아젠다 부합성: (a)외부 문언 부합=공고문 제공 시만 평가(부재 시 이 부분만 not_assessed) / (b)내부 채점 동선=목차↔평가축/과업항목 사상 구조는 제출본 단독으로 평가 가능 — 둘을 구분해 상시 not_assessed 방지(카나리 반영)"
  - "필요성·문제 정의: 시급성이 정부통계·시장수치·문헌 등 검증가능 근거로 서 있는가"
  - "목표·KPI 정량성: 최종/단계별/연차별 목표 위계 + KPI가 수치·측정방법·검증환경·비교기준(세계최고/국내수준/기존도구) 세트인가"
  - "방법·실현가능성: 수행방안이 구체적이고 기술적 근거·선행 확보 기술로 실현가능성을 입증하는가"
  - "수행역량·실적: 기관·책임자 실적(논문/특허/유사과제)이 과업과 정합하게 제시되는가(실명 과시가 이 장르의 정상)"
  - "추진체계·역할분담: 컨소시엄 구성·기관별 역할·연구비 배분이 과업 구조와 맞는가"
  - "활용·기대효과·파급력: 산출물의 활용 주체·경로가 구체적인가(막연한 기대 아님)"
  - "사업화·경제성 (조건부 — 트랙): 기술사업화/기업주관 트랙이면 시장·IP·표준화·투자 계획 평가. 기초연구·정책용역은 not_applicable"
  - "관리·일정·보고·위험/보안: 추진일정(간트)·보고체계·위험 대응·보안(해당 시 형상관리/하도급/자격) 등 수행 확실성 신호"
structure_conventions: >
  두 계열 공존(실측): ① 국가R&D 표준양식(혁신법 서식) = 서식 표두(보안등급·과제번호·TRL) → 필요성 →
  목표·내용(+수행일정·결과물) → 추진전략·체계 → 활용·기대효과 → (사업화) → 기관현황(5년 실적 서식) →
  평가착안점 → 안전·보안 → 기관별 연구비표. ② 용역 제안서 = 사업 개요(배경·목적·범위·특장점) →
  수행 방법 → 사업관리(일정·보고·인력·산출물) → 사업지원(발주처 협업·사후지원).
  예비계획서 변형 = 장=평가축 사상·20p 내외 압축·연구비/기관현황 생략(누락 지적 금지 — 서식에 원래 없음).
  공통 문장 관습: '§ 볼드 두괄식 + (기관/저자, 연도)' 인라인 출처, 연번 캡션(<표 3-1>), 개조식(○/-).
success_criteria: >
  평가위원이 배점 항목마다 대응 섹션·표를 즉시 찾을 수 있고, 핵심 주장마다 정량 근거+출처가 붙고,
  KPI가 측정·검증·비교 기준까지 세트로 제시되며, 요구 서식이 무결하고, 수행 확실성 신호(실적·일정·보고체계)가
  관리 장에 배치되면 성공. 최종 성공 = 선정(외부 결과이므로 품질 정본은 위 채점-가능성).
language: follow_document

# ── 비적용(논문 축 이식 금지 — 범주 오류 경고) ───────────────
non_axes: >
  학술적 신규성 그 자체·이론 증명 엄밀성(신규성은 '차별성/특장점' 수주 논거로만) · 저널식 참고문헌 완전
  서지·인용 형식 · 블라인드/익명성(실명 실적 과시가 득점 요소) · 재현성·코드/데이터 공개 의무 ·
  문단형 산문 완성도(개조식이 표준) · 절대 분량(서식이 규정) · **계획 전체를 완료된 연구처럼** 결과-지지 여부로
  판정하는 것(범주 오류 — 미래 계획 문서는 '수행 가능한가'를 본다). ⚠️ 단 **제안서가 인용한 선행·예비(pilot)
  결과의 정합·출처·타당성 검증은 정당한 평가**다(실현가능성·역량 축의 근거 검증 — 이것까지 막지 않는다, codex 정정).
  논문 rubric 8차원 이식 금지.

# ── axis_state / required_inputs (T1 규약) ─────────────────
# required_inputs: [공고문/RFP, 배점표, (해당 시) 표준양식 버전, (트랙 판별용) 사업 유형]
# 공고문·RFP·배점표 부재 시(실측: 표본 5/5 미동봉이 보통) — ⚠️ 축 전체가 아니라 **아래 세부 항목만** not_assessed:
#   배점표 정합(배점 대비 지면 배분) · 자격요건·가점 충족 · 축1의 (a)외부 문언 부합 부분 ·
#   분량·서식 규정 준수 · 연구비 상한 대비 적정성.
#   축1은 부재 시에도 **(b)내부 채점 동선(목차↔평가항목 사상 구조·부합 논증의 짜임새)을 pass/issue 로 실판정**하고,
#   (a)만 not_assessed 로 병기한다(축 단위 일괄 not_assessed 금지 — 카나리에서 실측된 collapse 방지, codex 지적).
#   → "제출본 단독으로 평가 가능한 축·부분만 평가"를 리뷰 서두에 명시.
# 사업화 축: 트랙 판별 불가 시 not_assessed, 기초연구·정책용역 판별 시 not_applicable.
# ⚠️ 이미지형 디자인 제안서(텍스트 레이어 없음 — 실측 117p/이미지 2,345개 표본): 텍스트 추출 리뷰 불가 →
#   PyMuPDF 렌더(dpi≈200)→비전 경로 필수(reference_pdf_analysis_standard). 미렌더 시 시각 축 not_assessed.

# ── 카나리 반영(2026-07-10, t2-canary-proposal) ──
# · kpi_cross_checks: KPI 표는 cross_reference 검증 의무 — 비중 합계(=100%)·연차별↔최종목표 수치 연결·
#   지표의 본문 재등장 여부(7장에만 있는 KPI = 결함)·비교 기준(세계최고 등) 출처·최신성.
# · leftover 스캔: 템플릿/타 제안서 재사용 잔재(엉뚱한 지자체명·기관명·캡션-본문 불일치) 명시 점검 —
#   '표지·편집 위생'급 결함이나 proposal 에선 신뢰성 직결(실측: 무근거 타 지자체 실증 문구 잔재).

