# profile.yaml — 문서유형 특성 프로필: 사용자 매뉴얼/설치가이드/CLI 레퍼런스(user-manual)
# 대상 = 설치·실행·사용법·오류대처 문서. 실측 근거: SAR-L2A User Manual(CLI Reference)·Installation Guide v1.0.0.
# rubric = 공통 코어 + 아래 evaluation_axes. 논문 축 이식 금지.
schema: doc_type_profile
version: 1
name: user-manual
purpose: >
  독자가 문서를 따라 **실제로 설치·실행·문제해결**할 수 있게 하는 것. 명령·인자·전제조건이 실제 동작과 일치하고,
  따라하면 재현되는지를 판다. 이론 근거가 아니라 '작업 재현성'이 정본.
audience: >
  시스템을 설치·운영하는 사용자(개발 배경 다양). 복붙해 실행하고 오류 시 대처를 찾는 독자.
evaluation_axes:
  - "명령·인자 정확성: 제시된 명령·플래그·기본값이 실제 구현(--help)·정본 스펙과 일치하는가. 존재하지 않는 옵션·오타 검출(문서세트 정본=코드 --help·Product Spec)."
  - "전제조건·환경 완결성: 설치 전제(OS·Docker·mount·권한·의존성 버전)가 빠짐없이 명시되고 순서가 재현가능한가."
  - "작업 재현성: 예제를 그대로 따라 실행하면 문서가 약속한 결과가 나오는가(경로·권한·산출물 위치 일치)."
  - "오류 대처·경계: 실패 모드·종료코드·경고 해석·복구 절차가 제공되고 위험 조작에 경고가 있는가."
  - "탐색성·완결성: 필요한 작업을 목차/색인으로 즉시 찾고, 흔한 사용 시나리오가 누락 없이 커버되는가."
  - "문서세트 정합: 실행 인자는 코드 --help·Product Spec, 호스트/Docker는 Installation Guide 등 정본 우선순위대로 정합하는가."
structure_conventions: >
  관행: 개요 → 전제/설치 → 표준 실행 명령 → 인자 레퍼런스(표) → 사용 예/시나리오 → 산출물 위치 → 오류/FAQ →
  종료코드. 명령 블록 + 인자 표 + 실행 예 중심.
success_criteria: >
  독자가 문서만으로 설치·실행에 성공하고, 명령·인자가 실제와 일치하며, 오류 시 대처를 찾고, 정본 문서와
  충돌 없이 정합하면 성공.
language: follow_document
non_axes: >
  학술 신규성·이론 엄밀성·문단 산문 완성도·저널 형식. 명령의 물리적 원리는 ATBD 소관(여기선 '정확·재현'만).
# axis_state: 구현(--help)·실환경 미제공 시 "명령 정확성·작업 재현성"의 실행대조만 not_assessed, 문서 내적·세트 정합은 실판정.
# 확장: [[algorithm-doc]] 기술문서 계열. Installation Guide도 이 프로필(설치 전제·환경 축 강조).
