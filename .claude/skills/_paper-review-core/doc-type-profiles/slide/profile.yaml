# profile.yaml — 문서유형 특성 프로필: 학회 발표자료(slide)
# 계약: T2 (선행 contract-review-doctype-generalization-20260710 + contract-review-t1-typeagnostic-20260710)
# 근거: 실문서 5덱 특성분석 실측(reference/slide/, example-org 4 + example-학회 기획세션 1, 2026-07-10).
# ★ 심장: 이 프로필이 rubric·페르소나의 파생원. 논문 기준을 이식하지 않는다.
# rubric = 공통 코어(원문근거·논리·명료·공정) + 아래 evaluation_axes 오버레이 + T1 증거규칙/axis_state.

schema: doc_type_profile
version: 1
name: slide

# ── 5필드 특성 ────────────────────────────────────────────
purpose: >
  제한 시간(실측 18~24장 ≈ 10~15분) 구두발표의 시각 보조물로서 연구의 기여·정량 결과를 전달.
  덱은 독립 문서가 아니라 발표 스크립트(speaker notes)와 쌍을 이룬다(실측 3/5덱 풀 대본).
  세션 유형에 따라 연구발표형(IMRaD 압축)과 초청/overview형(서론 확장·기술 카탈로그)으로 분기 —
  유형을 단정하지 말고 표지·목차에서 판별 후 평가(미판별 시 유형-중립 점검만).
audience: >
  동일 도메인 학회 청중(전문용어 무설명 사용 허용 — 일반 독자 기준 적용 금지).
  언어 관례: 국제행사=영문 슬라이드+국문 노트 허용, 국내=국문 본문+영문 섹션 라벨 혼용 허용(실측 관례).
evaluation_axes:
  - "스토리라인 구조 — 세션 유형 판별 후 유형별 기준 적용(오판 금지): [연구발표형] 표지→hook/목차→배경→(브리지)→방법→결과→결론→Q&A 완결 / [초청·기획세션형] 서론·튜토리얼 확장(예: 1/3) 허용, 본론 축약 정상 / [과제 overview형] 기술 카탈로그(주제별 병렬 섹션+목차+Q&A) 정상 — IMRaD 부재를 결함으로 세지 않음, 대신 목차-섹션-마무리 골격·섹션 내 논리만 평가 / [유형 미판별] 구조 축 = 유형-중립 점검(목차 존재·섹션 일관성만)"
  - "헤드라인 메시지성: 슬라이드 제목이 topic label이 아닌 주장(assertion, 가능하면 수치 포함)인가 — 헤드라인만 읽어도 논지 복원"
  - "텍스트 부하 적정성: 슬라이드당 텍스트가 구두발표 보조 수준인가(실측 정상범위 평균 200~410자/장; 600자↑ 과밀 신호)"
  - "출처·인용: 배경 주장 인용 + 외부 그림·데이터에 캡션 출처(모범: '출처: NASA ARSET Part 1, p.17' 수준). 자체 산출물은 면제"
  - "정량 결과 제시: 핵심 결과에 지표 표(≥3종 권장)·good/bad 정성 사례·가능하면 실측/문헌 대조 검증"
  - "한계·오차 정직 보고: 한계 섹션 또는 오차 원인 분석이 있고, 나쁜 사례를 은폐하지 않는가"
  - "발표 스크립트 정합: speaker notes가 있으면 슬라이드 주장과 노트 서술이 일치하는가 (노트 부재 = not_assessed, 결함 아님)"
  - "표지·편집 위생: 표지 메타(제목·저자·소속·학회명·사사) 완비 + placeholder/오타/잔여문자/학회명 미갱신(덱 재사용 시) 0"
structure_conventions: >
  실측 관례: 로마숫자 섹션 라벨(I.~VI.)을 본문 슬라이드 머리에 반복 · 배경 후 '제목 재제시+기여 요약'
  브리지 슬라이드 · 방법의 (a)~(d) 단계 분해 · 목차와 Q&A/감사 슬라이드 · 표지에 연구실 브랜딩과 사사.
  초청/기획세션형은 서론 확장(예: 8/24장), 과제 overview형은 기술 카탈로그 구조 허용 — 연구발표형 기준을 강제하지 않는다.
success_criteria: >
  헤드라인만 순서대로 읽어도 주장→근거 흐름이 복원되고, 결과가 정량지표+정성사례로 뒷받침되며,
  한계가 은폐 없이 보고되고, 덱 규모가 발표 시간에 맞고(≈2장/분), 편집 위생 결함이 0이면 성공.
language: follow_document

# ── 비적용(논문 축 이식 금지) ──────────────────────────────
non_axes: >
  참고문헌 목록 완전성·서지 형식(인라인 'et al., 연도'로 충분) · 재현성 상세(하이퍼파라미터 전수·코드 공개) ·
  초록/키워드 · 선행연구 전수 비교·novelty 논증 완결성 · 통계적 유의성 검정 엄밀성 · 분량/투고 양식 · 블라인드
  (발표자 실명·소속 노출이 필수인 장르). 논문 rubric 8차원 이식 금지.

# ── axis_state / required_inputs (T1 규약) ─────────────────
# deck-only 입력(영상·대본·발표조건 없음)일 때 not_assessed_missing_input 처리:
#   실전달력(발음·속도·시선) · 시간 준수(실소요) · 청중 반응·Q&A 대응 · 발표장 실제 가독성(스크린·조명) ·
#   애니메이션/빌드 효과의 전달 실효. 이미지 미렌더 리뷰면 시각 위계·색·폰트도 not_assessed(비전 렌더 시 평가).
# speaker notes 부재 → '발표 스크립트 정합' = not_assessed(2/5덱 실측 — 결함 아님).
# required_inputs(선택): 발표시간·세션유형·발표영상/대본 — 있으면 해당 축 활성.
# ── 카나리 반영(2026-07-10, t2-canary-slide) ──
# · 텍스트 부하 산정: 다이어그램/그림 내 라벨 텍스트는 본문 서술과 구분해 산정(라벨 오탐 방지 — 실측 1,168자 오탐례).
# · 미렌더 리뷰에서 "핵심 내용이 이미지에만 있어 보임" 유형의 omission finding 은 단정하지 말고
#   '렌더 확인 필요' 잠정 태그로 기재(비전 렌더 재리뷰 시 확정).

