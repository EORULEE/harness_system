# profile.yaml — 문서유형 특성 프로필: 특허 명세서(patent) — **발명자 관점 기술충실도 검토**
# 대상 = 특허 명세서(청구범위·발명의 설명·도면). 관할 = 국내(KIPO)·국외(USPTO 등) 양용.
# ★ 사용자 실제 워크플로(2026-07-14 명시): 발명자(연구팀) 역할은 ① **기술 disclosure 초안** 작성(청구항 아님) +
#   ② **변리사가 작성한 명세서에 '우리 기술이 제대로 담겼나' 기술충실도 검토**. 청구항 법적 작성·§101/§112 형식·
#   자명성(KSR)·claim construction = **변리사 소관 → 검토자는 판정 아니라 '기술 이슈 플래그'만**(참고 overlay).
# 근거: 실문서 5건(reference/patent/) — KR 4 + US 1, 서울시립대 영상융합 특허군. beta(전기·영상처리; 타 분야 미검증).
# rubric = 공통 코어 + 아래 evaluation_axes. 논문 축 이식 금지.
# ⚠️ 범위: document-quality 지표(기술 충실도 중심). 법적 유효성 결론은 범위 밖(변리사·심사관 소관).

schema: doc_type_profile
version: 2   # v2: 발명자 관점 재정의(2026-07-14 사용자) — 기술충실도 primary, 법적축은 변리사 overlay로 강등
name: patent

purpose: >
  발명자(연구팀)가 **자신의 기술이 특허 명세서에 정확·완전하게 담겼는지** 확인하는 것이 1차 목적.
  두 상황: (a) **기술 disclosure 초안 작성** — 발명의 기술 내용(원리·구성·실시예·데이터·차별점)을 변리사에게
  넘길 수준으로 정확히 기술 / (b) **변리사 명세서 검토** — 변리사가 작성한 청구항·명세서가 실제 우리 기술을
  올바르게·빠짐없이 반영하는가. 청구항의 법적 문언·적격성은 변리사가 책임지며, 여기서는 그것이 **우리 발명을
  기술적으로 정확히 표현하는가**를 본다(법적 유효성 판정 아님).

audience: >
  발명자·연구팀(자기 기술이 제대로 담겼나 확인) + (2차) 변리사에게 정확한 기술근거를 제공하려는 관점.
  법률 문언보다 **기술 내용의 정확·완전·차별성**을 읽는 독자.

evaluation_axes:
  - "기술 정확성(핵심): 명세서·청구항이 서술하는 발명의 원리·수식·파라미터·메커니즘·데이터·성능수치가 실제
     우리 기술과 일치하는가. 기술적 오류·과장·오기(변리사가 기술을 잘못 이해해 생긴 왜곡) 검출. 실시예·실험
     데이터가 실제 결과와 부합하는가."
  - "기술 완결성·핵심 반영: 우리 발명의 **핵심 기술 특징·구성요소·실시형태**가 빠짐없이 담겼는가. 정작 중요한
     차별 기술이 명세서/청구항에서 누락·축소되지 않았는가(발명자만 아는 '진짜 핵심'이 반영됐는지). 필수 실시예·
     대안 실시형태·파라미터 범위가 충분한가."
  - "차별점(우리 기술의 실제 기여) 반영: 배경기술·선행기술 대비 **우리 기술의 진짜 차별점**이 명세서에 정확히
     서술되고 청구범위가 그 차별점을 담는가. 우리 기여가 아닌 것을 핵심처럼 쓰거나, 진짜 기여가 종속항에 묻히지
     않았는가. ⚠️ 선행기술의 법적 신규성/진보성 판단은 변리사 소관 — 여기선 '기술 차별점 서술의 정확성'만."
  - "청구범위-기술 정합(발명자 관점): 변리사가 작성한 청구항이 우리 발명을 **과협**(핵심 기여를 빠뜨려 보호 취약)
     하거나 **잘못 특정**(우리가 안 하는 방식으로 한정)하지 않았는가. 청구항 구성요소가 우리 실제 기술 구성과
     대응하는가. ⚠️ 청구항 명확성·antecedent·MPF 등 법적 형식은 변리사 소관 → 발견 시 '변리사 확인 요망'으로 플래그만."
  - "도면·실시예 기술 정합: 도면(부호의 설명)·블록도·흐름도가 우리 기술 구성을 정확히 표현하고, 명세서 서술과
     도면·실시예가 기술적으로 모순 없이 일치하는가. 미도시 핵심 구성·잘못된 도면 검출."
  - "용어·표기 정합: 우리 기술 용어가 명세서에서 일관·정확히 정의·사용되고(변리사가 임의 용어로 바꿔 기술 의미가
     흐려지지 않았는가), 다관할 출원(국내↔국외) 시 **번역이 기술 의미를 보존**하는가(오역으로 기술이 달라지지 않음).
     단일 관할이면 번역 부분 not_applicable."

structure_conventions: >
  관할 표준(참고 — 발명자는 구조 적법성보다 '기술이 각 절에 정확히 담겼나'를 봄):
  KR(KIPO): 서지 → (54)명칭 → (57)요약 → 청구범위(청구항) → 발명의 설명(기술분야→배경기술→발명의 내용
    [해결 과제·해결 수단·효과]→도면의 간단한 설명→발명을 실시하기 위한 구체적인 내용→부호의 설명) → 도면. [0001] 문단.
  US(USPTO): 서지 → ABSTRACT → BACKGROUND → SUMMARY → BRIEF DESCRIPTION OF DRAWINGS → DETAILED DESCRIPTION
    → What is claimed. 'comprising'.
  검토 초점 = 각 기술 서술 절(과제·수단·효과·구체적 내용·실시예)에 우리 기술이 정확·완전히 반영됐는가.

success_criteria: >
  발명자가 명세서를 읽고 '우리 기술이 정확하고 빠짐없이, 우리 차별점이 살아있게 담겼다'고 확인할 수 있으면 성공.
  기술 오류·핵심 누락·차별점 왜곡·청구범위의 기술적 과협/오특정·도면 불일치·용어 왜곡·오역이 없어야 한다.
  ⚠️ 법적 등록가능성·유효성은 이 검토의 성공기준이 아니다(변리사·심사관 소관).

language: follow_document

non_axes: >
  ⚠️ **변리사 소관(발명자 검토 대상 아님 — 판정 말고 '변리사 확인 요망' 플래그만)**: 청구항 법적 확정성·
  antecedent basis·means-plus-function 형식·§101 적격성·§112 형식요건·자명성(KSR/TSM) 법적 판단·claim
  construction·IDS·우선권 절차·발명의 단일성 등 법정 형식·거절이유 대응. 이는 변리사가 책임지며, 발명자 검토는
  이들이 '우리 기술을 왜곡하는지'만 본다.
  학술적 참신성·저널 적합성·IMRaD·peer-review 어휘·통계 유의성·문단형 산문 완성도 = 이식 금지.

# ── axis_state / required_inputs (T1) ─────────────────────
# required_inputs: [검토 대상 명세서(변리사 작성) 또는 disclosure 초안, 우리 실제 기술 근거(논문·코드·실험데이터·발명자 설명)]
# ★ '우리 실제 기술 근거' 미제공 시 → 기술 정확성/완결성/차별점 판정 불가(not_assessed) — 명세서 내적정합만.
#   (발명자 관점 검토의 본질 = 명세서 ↔ 실제 기술 대조이므로 실제 기술 근거가 핵심 입력)
# 단일 관할 → 용어정합의 번역 부분 not_applicable.
# 모드: (a)초안 작성 = harness-patent-assist(기술 disclosure 작성, 청구항 아님) / (b)검토 = 본 프로파일.

# ── 법적 overlay (변리사 소관 — 참고·플래그용, 판정 아님) ────
# 발견 시 '변리사 확인 요망'으로만 표기(발명자가 법적 판정 안 함):
#   KR: 기재요건(§42)·다항제·단일성 / US: §101(SW/방법 적격성)·§112(a/b/f MPF)·§102/103(KSR)·IDS·terminal disclaimer.
# 이는 발명자 검토 산출을 변리사에게 넘길 때 '기술 이슈 + (참고)법적 확인점' 형태로 전달하기 위함.

