# 표본 = KR/US 전기·영상처리 4발명. 미검증: 화학(Markush)·바이오(서열)·의약(효과데이터)·SW/AI·기계. 도착 시 보정.
# 근거 = reference/patent/. 관련: harness-patent-assist(초안 작성 스킬).
