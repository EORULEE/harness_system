# profile.yaml — 문서유형 특성 프로필: 프로토콜/인터페이스 명세(protocol-spec)
# 대상 = 메시지/이벤트 계약·상태전이·종료코드·타임아웃 정의. 실측 근거: GAMMA L2A Pipeline IPC PROTOCOL_KR v1.0.0.
# rubric = 공통 코어 + 아래 evaluation_axes. 논문 축 이식 금지.
schema: doc_type_profile
version: 1
name: protocol-spec
purpose: >
  양측(예: GUI↔파이프라인)이 **상호운용 가능한 구현**을 각자 작성하게 하는 계약. 메시지 필드·타입·순서·상태전이·
  경계조건이 모호하면 구현이 엇갈리므로, 계약 완결성·경계 정의를 판다.
audience: >
  프로토콜 양단을 구현하는 개발자. 스펙만으로 송수신 파서와 상태기계를 작성해야 하는 독자.
evaluation_axes:
  - "메시지 계약 완결성: 이벤트/명령의 필드·타입·필수여부·인코딩(JSONL 등)이 파서 작성에 충분하고 예시와 일치하는가."
  - "상태전이·수명주기: 시작→진행→종료(성공/실패/취소) 상태와 전이 조건, 종료코드 매핑이 완결·무모순인가."
  - "경계·오류·타임아웃: hang 판정·타임아웃·drain/cancel 의미·부분실패·재시도 규약이 정의되고 참조 스펙과의 차이를 명시하는가."
  - "동시성·순서 보장: 이벤트 순서·heartbeat·비동기 처리(병렬 배치 등)의 보장/비보장이 명확한가."
  - "예제↔규격 일치: 샘플 메시지가 규격과 정확히 대응하는가(실측 예시 권장)."
  - "문서세트 정합: 산출물 kind·경로·상태값이 Product Spec·User Manual과 정합하는가."
structure_conventions: >
  관행: 개요(전송 매체·인코딩) → 이벤트(P→C) 필드 표 → 명령(C→P) 표 → 종료코드 → 타임아웃/오류 가이드.
  메시지 표 + JSON 샘플 중심.
success_criteria: >
  양단 구현자가 스펙만으로 상호운용 파서·상태기계를 작성할 수 있고, 경계·오류·순서 규약이 무모호하며,
  예제가 규격과 일치하고 문서세트와 정합하면 성공.
language: follow_document
non_axes: >
  학술 신규성·이론·문단 산문·저널 형식. 논문 8차원 이식 금지.
# axis_state: 구현 미제공 시 "예제↔규격"의 실행대조만 not_assessed, 계약 내적·세트 정합은 실판정.
# 확장: [[algorithm-doc]] 기술문서 계열. api-reference도 인접(시그니처·반환 계약).
