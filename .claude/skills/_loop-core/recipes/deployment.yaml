# recipes/deployment.yaml — 서버·프로젝트 배포
name: deployment
task_type: deployment
description: "'이 서버에 배포해줘'. 머신/환경/절대경로 없으면 확인질문. delta→backup→canary→smoke→live."
executor: deploy-workflow
validation_mode: [deterministic-only, human-gated]   # 중요 배포는 + cross-model
reuses:
  - docs/deploy-targets.md            # 배포 레지스트리(reference_deploy_targets)
gate: plan-approval
steps:
  - {id: 1, action: "머신명·환경·프로젝트 절대경로 확인(없으면 AskUserQuestion)", uses: "AskUserQuestion", when: "missing-target"}
  - {id: 2, action: "delta 산출(현 설치 vs 신규)", uses: "diff"}
  - {id: 3, action: "대상 backup", uses: "cp .bak-*"}
  - {id: 4, action: "한 대상 canary 배포", uses: "scp/copy"}
  - {id: 5, action: "smoke 실행(원격)", uses: "remote smoke"}
  - {id: 6, action: "live 검증(첫 대상 ACTIVE 확인)", uses: "probe"}
budget: {targets_per_run: 1, repeat_fail_hold: 2}     # 한 번에 대상 1개
editable_paths: ["<대상 프로젝트 .claude/**, hooks/**, scripts/** — delta 만>"]
human_gates: ["배포 실행(live)", "settings 변경"]
cross_model: "중요 배포는 Codex 적대검토 추가"
success_conditions:
  - "첫 대상 smoke PASS + live ACTIVE"
  - "settings 병합만(전체 교체 아님)"
hold_conditions:
  - "머신/환경/절대경로 미상 → 확인질문(HOLD)"
  - "첫 대상 ACTIVE 전 다른 프로젝트 확장 금지"
  - "smoke 실패"
forbidden:
  - "memory·ACTIVE_CONTEXT·queue·transcript·secret 복사 금지"
  - "settings 전체 교체 금지(병합만)"
  - "첫 대상 ACTIVE 전 fleet 확장 금지"
  - "사용자 승인 없는 배포 금지. 다른 서버·프로젝트 자동 배포 금지."
notes: "delta→backup→canary→smoke→live 순서 강제. 도메인(CLAUDE.md/agents/instincts) 보존."
