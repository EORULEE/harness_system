    stop_conditions: [동일실패2, 전역5]
  - pair_id: geo
    axis: "3 geospatial"
    c_agent: c-geo
    x_agent: x-geo
    c_write_permission: allowed_paths-only
    x_write_permission: none
    deterministic_verifiers: [metric]
    maximum_iterations: 5
    stop_conditions: [동일실패2, 전역5]
  - pair_id: audit
    axis: "5 audit"
    c_agent: c-audit
    x_agent: x-audit
