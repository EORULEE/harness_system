schema: pair_topology/v1
project: proj-full-fixture
level: full
pairs:
  - pair_id: science
    axis: "1 domain science"
    c_agent: c-science
    x_agent: x-science
    c_write_permission: allowed_paths-only
    x_write_permission: none
    deterministic_verifiers: [compile, test, metric, schema]
    cross_model_policy: "HIGH/CRITICAL 시 Codex 1회"
    maximum_iterations: 5
    stop_conditions: [동일실패2, 전역5, source부족]
